name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable GitHub Pages
        run: |
          api_root="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          auth_header="Authorization: Bearer ${GITHUB_TOKEN}"
          accept_header="Accept: application/vnd.github+json"
          version_header="X-GitHub-Api-Version: 2022-11-28"

          pages_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "${auth_header}" \
            -H "${accept_header}" \
            -H "${version_header}" \
            "${api_root}/pages")

          if [ "${pages_status}" = "404" ]; then
            echo "GitHub Pages is not enabled. Attempting to enable with build_type=workflow..."
            response=$(curl -s -w "\n%{http_code}" -X POST \
              -H "${auth_header}" \
              -H "${accept_header}" \
              -H "${version_header}" \
              "${api_root}/pages" \
              -d '{"build_type":"workflow"}')
            http_code=$(echo "${response}" | tail -n1)
            body=$(echo "${response}" | sed '$d')
            echo "Enable response (${http_code}): ${body}"

            if [ "${http_code}" != "201" ] && [ "${http_code}" != "409" ]; then
              echo "::error::Could not enable GitHub Pages automatically (HTTP ${http_code})."
              echo "::error::Open https://github.com/${GITHUB_REPOSITORY}/settings/pages"
              echo "::error::Set Build and deployment -> Source -> GitHub Actions, then re-run this workflow."
              exit 1
            fi
          else
            echo "GitHub Pages is already configured (HTTP ${pages_status})."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
